<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PQR - Peticiones, Quejas y Reclamos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .mensaje {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .exito {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulario PQR</h2>

    <form id="pqrForm">
        <label>Nombre</label>
        <input type="text" id="nombre" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Tipo</label>
        <select id="tipo">
            <option value="peticion">Petición</option>
            <option value="queja">Queja</option>
            <option value="reclamo">Reclamo</option>
        </select>

        <label>Mensaje</label>
        <textarea id="mensaje" required></textarea>

        <button type="submit">Enviar PQR</button>
    </form>

    <div id="respuesta" class="mensaje"></div>
</div>

<script>
document.getElementById("pqrForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        tipo: document.getElementById("tipo").value,
        mensaje: document.getElementById("mensaje").value
    };

    const respuestaDiv = document.getElementById("respuesta");

    try {
        const response = await fetch("/pqr/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            respuestaDiv.innerHTML = result.mensaje;
            respuestaDiv.className = "mensaje exito";
            document.getElementById("pqrForm").reset();
        } else {
            respuestaDiv.innerHTML = result.error || "Error al enviar.";
            respuestaDiv.className = "mensaje error";
        }

    } catch (error) {
        respuestaDiv.innerHTML = "Error de conexión con el servidor.";
        respuestaDiv.className = "mensaje error";
    }
});
</script>

</body>
</html>
