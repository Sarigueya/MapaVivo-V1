<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · MapaVivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/estilos.css">
<style>
body { overflow: auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

.auth-page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--borde);
  border-radius: var(--r-xl);
  width: 100%;
  max-width: 420px;
  box-shadow: var(--sombra-lg);
  overflow: hidden;
}

.auth-card-header {
  background: var(--verde-bg);
  border-bottom: 1px solid var(--verde-borde);
  padding: 28px 32px 24px;
  text-align: center;
}

.auth-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  text-decoration: none;
}

.auth-logo-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--verde);
  animation: latido 2.5s ease-in-out infinite;
}

.auth-logo-nombre {
  font-family: var(--fuente);
  font-size: 22px;
  font-weight: 700;
  color: var(--texto);
}

.auth-logo-nombre em { font-style: normal; color: var(--verde); }

.auth-card-header h1 {
  font-family: var(--fuente);
  font-size: 22px;
  font-weight: 700;
  color: var(--texto);
  margin-bottom: 6px;
}

.auth-card-header p {
  font-size: 14px;
  color: var(--texto2);
  line-height: 1.5;
}

.auth-card-body {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.campo-etiqueta {
  font-size: 13px;
  font-weight: 600;
  color: var(--texto2);
  display: block;
  margin-bottom: 7px;
}

input {
  width: 100%;
  font-family: var(--fuente);
  font-size: 14px;
  color: var(--texto);
  background: var(--bg);
  border: 1.5px solid var(--borde);
  border-radius: var(--r-sm);
  padding: 11px 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
input:focus {
  border-color: var(--verde);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(45,122,79,.1);
}
input::placeholder { color: var(--texto3); }

.btn-principal {
  width: 100%;
  padding: 13px;
  background: var(--verde);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  font-family: var(--fuente);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 2px 8px rgba(45,122,79,.25);
  margin-top: 4px;
}
.btn-principal:hover:not(:disabled) {
  background: var(--verde-claro);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(45,122,79,.3);
}
.btn-principal:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.auth-card-footer {
  padding: 0 32px 28px;
  text-align: center;
}

.auth-link-texto {
  font-size: 13px;
  color: var(--texto3);
}

.auth-link-texto a {
  color: var(--verde);
  font-weight: 600;
  text-decoration: none;
}
.auth-link-texto a:hover { text-decoration: underline; }

.alerta {
  padding: 12px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  line-height: 1.5;
  display: none;
}
.alerta.error   { background: var(--rojo-bg);   color: var(--rojo);   border: 1px solid #f0b8b8; }
.alerta.exito   { background: var(--verde-bg);  color: var(--verde);  border: 1px solid var(--verde-borde); }
.alerta.visible { display: block; }

.separador {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--texto3);
  font-size: 12px;
}
.separador::before, .separador::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--borde);
}

/* Header mínimo */
.mini-header {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--borde);
  display: flex;
  align-items: center;
  padding: 0 24px;
  flex-shrink: 0;
}
.mini-header a {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.mini-header .logo-icono {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  background: var(--verde-bg);
  border: 1.5px solid var(--verde-borde);
  display: flex; align-items: center; justify-content: center;
}
.mini-header .logo-circulo {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--verde);
}
.mini-header .logo-nombre {
  font-family: var(--fuente);
  font-size: 18px;
  font-weight: 700;
  color: var(--texto);
}
.mini-header .logo-nombre em { font-style: normal; color: var(--verde); }

.volver-mapa {
  margin-left: auto;
  font-size: 13px;
  color: var(--verde);
  font-weight: 500;
  text-decoration: none;
}
.volver-mapa:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="mini-header">
  <a href="/">
    <div class="logo-icono"><div class="logo-circulo"></div></div>
    <span class="logo-nombre">Mapa<em>Vivo</em></span>
  </a>
  <a href="/" class="volver-mapa">← Volver al mapa</a>
</header>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-card-header">
      <h1>Bienvenido de nuevo</h1>
      <p>Ingresa con tu cuenta de organización verificada</p>
    </div>

    <div class="auth-card-body">

      <div id="alerta" class="alerta"></div>

      <div>
        <label class="campo-etiqueta" for="username">Usuario</label>
        <input id="username" type="text" placeholder="Tu nombre de usuario" autocomplete="username">
      </div>

      <div>
        <label class="campo-etiqueta" for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Tu contraseña" autocomplete="current-password">
      </div>

      <button class="btn-principal" id="btn-login" onclick="hacerLogin()">
        Iniciar sesión
      </button>

    </div>

    <div class="auth-card-footer">
      <p class="auth-link-texto">
        ¿Tu organización todavía no tiene cuenta?
        <a href="/solicitar-cuenta/">Solicita una aquí</a>
      </p>
    </div>

  </div>
</div>

<script>
// Si ya está logueado, redirigir al mapa
async function verificarSesion() {
  try {
    const res = await fetch('/api/auth/perfil/', { credentials: 'include' });
    if (res.ok) window.location.href = '/';
  } catch {}
}
verificarSesion();

// Enter en los campos también dispara login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') hacerLogin();
});

async function hacerLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const alerta   = document.getElementById('alerta');
  const btn      = document.getElementById('btn-login');

  if (!username || !password) {
    mostrarAlerta('Completá usuario y contraseña.', 'error');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Ingresando...';
  alerta.classList.remove('visible');

  try {
    // 1. Obtener token CSRF
    await fetch('/api/health/', { credentials: 'include' });
    const csrfToken = getCsrf();

    // 2. Login
    const res = await fetch('/api/auth/login/', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
      credentials: 'include',
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (res.ok) {
      mostrarAlerta('¡Bienvenido! Redirigiendo...', 'exito');
      setTimeout(() => { window.location.href = '/'; }, 800);
    } else {
      mostrarAlerta(data.error || 'No se pudo iniciar sesión.', 'error');
    }
  } catch {
    mostrarAlerta('No se pudo conectar con el servidor.', 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Iniciar sesión';
  }
}

function mostrarAlerta(texto, tipo) {
  const el = document.getElementById('alerta');
  el.textContent = texto;
  el.className   = `alerta ${tipo} visible`;
}

function getCsrf() {
  return document.cookie.split('; ')
    .find(r => r.startsWith('csrftoken='))
    ?.split('=')[1] || '';
}
</script>
</body>
</html>
